<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Selection Form</title>
</head>
<body>
  <h1>Sport Selection Form</h1>

  <form action="#">
    <fieldset>
      <legend>Sport Picker</legend>

      <label for="sport-picker">Select your sport</label>
      <select id="sport-picker" name="sport" required>
        <option value="">--Please choose an option--</option>
        <option value="rugby">Rugby</option>
        <option value="soccer">Soccer</option>
        <option value="golf">Golf</option>
      </select>
      <br>
      <br>

      <label for="time-picker">Select your time</label>
      <input type="time" name="time" id="time-picker">
      <br>
      <br>

      <button type="submit">Submit</button>
    </fieldset>
  </form>
</body>
</html>
