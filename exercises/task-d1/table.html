<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Exercise</title>
</head>
<body>
  <h1>Table Exercise</h1>

  <table border="1">
    <thead>
      <tr>
        <th scope="col">First Name</th>
        <th scope="col">Last Name</th>
        <th scope="col">E-Mail</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>John</td>
        <td>Doe</td>
        <td><a href="mailto:john@doe.org">john@doe.org</a></td>
      </tr>
      <tr>
        <td>Jane</td>
        <td>Doe</td>
        <td><a href="mailto:jane@doe.org">jane@doe.org</a></td>
      </tr>
      <tr>
        <td colspan="2">Buckethead</td>
        <td><a href="mailto:buckethead@music.org">buckethead@music.org</a></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
