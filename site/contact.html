<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | HTML Demo Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Main navigation">
      <a class="site-nav__brand" href="./index.html">HTML Demo</a>
      <ul class="site-nav__links">
        <li><a href="./index.html">Home</a></li>
        <li><a aria-current="page" href="./contact.html">Contact</a></li>
        <li><a href="./index.html#about">About</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-shell">
    <section class="panel">
      <p class="eyebrow">Contact</p>
      <h1>Send a practice message.</h1>
      <p class="lead">
        This form is intentionally simple, but it uses proper labels, spacing, and
        a more accessible structure.
      </p>

      <form class="contact-form" action="#">
        <div class="field">
          <label for="contact-name">Name</label>
          <input id="contact-name" name="name" type="text" placeholder="Your name">
        </div>

        <div class="field">
          <label for="contact-email">Email</label>
          <input id="contact-email" name="email" type="email" placeholder="you@example.com">
        </div>

        <div class="field">
          <label for="contact-message">Message</label>
          <textarea id="contact-message" name="message" rows="6" placeholder="Write your message here"></textarea>
        </div>

        <button class="button button--primary" type="submit">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
